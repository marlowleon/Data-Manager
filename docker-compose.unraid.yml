services:
  data-manager:
    build:
      context: .
      args:
        DATA_MANAGER_VERSION: ${DATA_MANAGER_VERSION:-1.7.0}
    container_name: data-manager
    restart: unless-stopped
    mem_limit: 4g
    ports:
      - "8085:8080"
    environment:
      DATA_MANAGER_ADMIN_USER: ${DATA_MANAGER_ADMIN_USER:-admin}
      DATA_MANAGER_ADMIN_PASSWORD: ${DATA_MANAGER_ADMIN_PASSWORD:?Set DATA_MANAGER_ADMIN_PASSWORD in .env}
      DATA_MANAGER_SESSION_SECRET: ${DATA_MANAGER_SESSION_SECRET:?Set DATA_MANAGER_SESSION_SECRET in .env}
      DATA_MANAGER_PORT: 8080
      DATA_MANAGER_MAX_READY_PER_SCAN: 5
      DATA_MANAGER_MAX_QUEUE_DISPLAY: 50
      DATA_MANAGER_TRANSFER_CHUNK_SIZE: 1048576
      DATA_MANAGER_MEMORY_LIMIT_BYTES: 4294967296
      DATA_MANAGER_MAX_NEW_FILE_EVENTS_PER_SCAN: 25
      DATA_MANAGER_MAX_REQUEUE_PER_CLICK: 100
      DATA_MANAGER_LIBRARY_VISIBILITY_SCAN_LIMIT: 0
      DATA_MANAGER_LIBRARY_VISIBILITY_CACHE_SECONDS: 300
      DATA_MANAGER_FFPROBE_TIMEOUT: 20
      DATA_MANAGER_FILE_MANAGEMENT_WORKERS: 6
      DATA_MANAGER_MEDIA_SCAN_WORKERS: 6
      DATA_MANAGER_MALWARE_SCAN_HOUR: 12
      DATA_MANAGER_MALWARE_SCAN_TIMEOUT: 900
      DATA_MANAGER_MALWARE_SCAN_WORKERS: 2
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    # Example volumes for Unraid. Set these paths in .env.
    volumes:
      - ${DATA_MANAGER_DATA_DIR:-./data}:/data
      - ${DATA_MANAGER_WATCH_DIR:?Set DATA_MANAGER_WATCH_DIR in .env}:/watch
      - ${DATA_MANAGER_REVIEW_DIR:?Set DATA_MANAGER_REVIEW_DIR in .env}:/to-review
      - ${DATA_MANAGER_QUARANTINE_DIR:?Set DATA_MANAGER_QUARANTINE_DIR in .env}:/quarantine
      - ${DATA_MANAGER_MOVIE_DIR:?Set DATA_MANAGER_MOVIE_DIR in .env}:/movies
      - ${DATA_MANAGER_TV_DIR:?Set DATA_MANAGER_TV_DIR in .env}:/tv
